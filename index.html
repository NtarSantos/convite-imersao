  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

    var d3g = ctx.createGain();
    d3g.gain.value = 0.3;
    var droneGain = ctx.createGain();
    droneGain.gain.value = 0.055;
    d1.connect(droneGain);
    d2.connect(droneGain);
    d3.connect(d3g);
    d3g.connect(droneGain);
    droneGain.connect(master);

    noise.start(); lfo1.start(); lfo2.start(); d1.start(); d2.start(); d3.start();
    master.gain.setTargetAtTime(audio.muted ? 0 : VOLUME, ctx.currentTime, 3);
    updateBtn();
  }

  function setMuted(m) {
    audio.muted = m;
    if (audio.master && audio.ctx) {
      audio.master.gain.setTargetAtTime(m ? 0 : VOLUME, audio.ctx.currentTime, 0.6);
    }
    updateBtn();
  }

  var ICON_ON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffe9c0" stroke-width="1.7" stroke-linecap="round"><path d="M3 14c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/><path d="M3 9c2-3 4-3 6 0s4 3 6 0 4-3 6 0" opacity=".45"/></svg>';
  var ICON_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffe9c0" stroke-width="1.7" stroke-linecap="round"><path d="M3 12c2-3 4-3 6 0s4 3 6 0 4-3 6 0" opacity=".4"/><line x1="4" y1="20" x2="20" y2="4"/></svg>';

  function updateBtn() {
    var btn = document.getElementById('imersao-som');
    if (!btn) return;
    btn.innerHTML = audio.muted ? ICON_OFF : ICON_ON;
    btn.setAttribute('aria-label', audio.muted ? 'Ativar som ambiente' : 'Silenciar som ambiente');
    btn.style.opacity = audio.muted ? '.55' : '.9';
  }

  function makeBtn() {
    if (document.getElementById('imersao-som')) return;
    var btn = document.createElement('button');
    btn.id = 'imersao-som';
    btn.type = 'button';
    btn.style.cssText = 'position:fixed;left:18px;bottom:18px;z-index:99990;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(2,22,28,.55);border:1px solid rgba(255,232,180,.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:opacity .3s,box-shadow .3s;box-shadow:0 0 24px rgba(0,0,0,.35);';
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!audio.started) {
        startAudio();
      } else {
        setMuted(!audio.muted);
      }
    });
    document.body.appendChild(btn);
    updateBtn();
  }

  // Primeiro gesto em qualquer lugar liga o som (política de autoplay)
  function firstGesture() { startAudio(); }
  window.addEventListener('pointerdown', firstGesture, { passive: true });
  window.addEventListener('keydown', firstGesture);
  window.addEventListener('touchstart', firstGesture, { passive: true });

  document.addEventListener('visibilitychange', function () {
    if (!audio.ctx) return;
    if (document.hidden) audio.ctx.suspend();
    else if (!audio.muted) audio.ctx.resume();
  });

  // ===== Animações =====
  var CSS =
    '@keyframes imersaoGlow{0%,100%{text-shadow:0 0 90px rgba(255,230,176,.35)}50%{text-shadow:0 0 130px rgba(255,230,176,.62)}}' +
    '@keyframes imersaoBeam{0%,100%{opacity:.7}50%{opacity:1}}' +
    '.imersao-reveal{opacity:0;transform:translateY(26px);transition:opacity 1.1s ease,transform 1.1s ease}' +
    '.imersao-reveal.imersao-in{opacity:1;transform:translateY(0)}' +
    '@media (prefers-reduced-motion:reduce){.imersao-reveal{opacity:1;transform:none;transition:none}}';

  var observer = null;

  function setupObserver() {
    if (!('IntersectionObserver' in window)) return null;
    return new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting) {
          en.target.classList.add('imersao-in');
          observer.unobserve(en.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  }

  function revealFallback() {
    // Garante o reveal mesmo se o IntersectionObserver não disparar
    var vh = window.innerHeight || document.documentElement.clientHeight;
    document.querySelectorAll('.imersao-reveal:not(.imersao-in)').forEach(function (el) {
      var r = el.getBoundingClientRect();
      if (r.top < vh * 0.92 && r.bottom > 0) el.classList.add('imersao-in');
    });
  }

  function applyFx() {
    // Reveal em títulos, parágrafos, botões e linhas das noites
    var sections = document.querySelectorAll('[data-screen-label]');
    sections.forEach(function (sec) {
      var targets = sec.querySelectorAll('h2, p, button, div[style*="border-top"]');
      var idx = 0;
      targets.forEach(function (el) {
        if (el.dataset.imersaoFx) return;
        el.dataset.imersaoFx = '1';
        if ('IntersectionObserver' in window && observer) {
          el.classList.add('imersao-reveal');
          el.style.transitionDelay = (idx % 5) * 0.12 + 's';
          observer.observe(el);
        }
        idx++;
      });

      // Feixes de luz "respirando"
      var beams = sec.querySelectorAll('div[style*="clip-path"]');
      var b = 0;
      beams.forEach(function (el) {
        if (el.dataset.imersaoBeam) return;
        el.dataset.imersaoBeam = '1';
        el.style.animation = 'imersaoBeam ' + (8 + b * 1.7) + 's ease-in-out ' + (b * 1.1) + 's infinite';
        b++;
      });
    });

    // Pulso de brilho no título IMERSÃO do hero
    var hero = document.querySelector('[data-screen-label="Hero"]');
    if (hero) {
      var title = hero.querySelector('div[style*="Anton"]');
      if (title && !title.dataset.imersaoGlow) {
        title.dataset.imersaoGlow = '1';
        title.style.animation = 'imersaoGlow 7s ease-in-out infinite';
      }
    }
  }

  var booted = false;
  var bootTimer = setInterval(function () {
    if (!document.querySelector('[data-screen-label]')) return;
    if (!booted) {
      booted = true;
      var st = document.createElement('style');
      st.textContent = CSS;
      document.head.appendChild(st);
      observer = setupObserver();
      makeBtn();
    }
    // Reaplica sempre (idempotente): cobre nós recriados pelo React (ex.: tela de sucesso)
    applyFx();
    revealFallback();
  }, 500);

  window.addEventListener('scroll', function () { revealFallback(); }, { passive: true });

  // Depois de 30s, desacelera o rescan para poupar bateria
  setTimeout(function () {
    clearInterval(bootTimer);
    setInterval(function () { applyFx(); revealFallback(); }, 2000);
  }, 30000);
})();
  </script>

  <script>
// ===== IMERSÃO SCROLL: mergulho dirigido pelo scroll =====
// Parallax do hero, véu de profundidade e profundímetro (HUD), com suavização.
(function () {
  'use strict';

  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var MAX_DEPTH = 42; // bate com a última noite (−42m)

  var state = { target: 0, current: 0, raf: null, ready: false };
  var hud = null, hudValue = null, hudFill = null, veil = null, heroContent = null, heroSection = null;

  function build() {
    // Véu de profundidade: escurece no meio da descida, clareia no amanhecer do rodapé
    veil = document.createElement('div');
    veil.id = 'imersao-veil';
    veil.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:40;background:linear-gradient(180deg, rgba(1,8,12,.9) 0%, rgba(1,10,14,.75) 100%);opacity:0;transition:none;';
    document.body.appendChild(veil);

    // Profundímetro
    hud = document.createElement('div');
    hud.id = 'imersao-depth';
    hud.style.cssText = 'position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:99980;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;transition:opacity .6s ease;';
    hud.innerHTML =
      '<div style="font-family:\'Jost\',sans-serif;font-weight:300;font-size:9px;letter-spacing:.3em;color:rgba(216,196,160,.6);text-transform:uppercase;writing-mode:vertical-rl;">Profundidade</div>' +
      '<div style="position:relative;width:1px;height:64px;background:rgba(255,232,180,.2);">' +
        '<div id="imersao-depth-fill" style="position:absolute;top:0;left:0;width:100%;height:0%;background:linear-gradient(180deg, rgba(255,232,180,.9), rgba(134,198,214,.7));box-shadow:0 0 8px rgba(255,232,180,.5);"></div>' +
      '</div>' +
      '<div id="imersao-depth-val" style="font-family:\'Jost\',sans-serif;font-weight:400;font-size:14px;letter-spacing:.12em;color:#ffe9c0;text-shadow:0 0 16px rgba(255,232,180,.45);">0m</div>';
    document.body.appendChild(hud);
    hudValue = document.getElementById('imersao-depth-val');
    hudFill = document.getElementById('imersao-depth-fill');

    heroSection = document.querySelector('[data-screen-label="Hero"]');
    if (heroSection) {
      var img = heroSection.querySelector('img');
      heroContent = img ? img.parentElement : null;
    }
  }

  function docMax() {
    return Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
  }

  function render() {
    var y = state.current;
    var progress = Math.min(1, Math.max(0, y / docMax()));
    var vh = window.innerHeight || 800;

    // Hero afunda: conteúdo sobe mais devagar que o scroll e some aos poucos
    if (heroContent && !reduced) {
      var f = Math.min(1, y / (vh * 0.95));
      heroContent.style.transform = 'translateY(' + (y * 0.32).toFixed(1) + 'px) scale(' + (1 - f * 0.06).toFixed(3) + ')';
      heroContent.style.opacity = (1 - f * 0.85).toFixed(3);
    }

    // Véu: pico de escuridão em ~60% da descida, limpa ao emergir no rodapé
    var dark;
    if (progress < 0.6) dark = (progress / 0.6) * 0.34;
    else dark = 0.34 * (1 - (progress - 0.6) / 0.4);
    veil.style.opacity = Math.max(0, dark).toFixed(3);

    // HUD: aparece depois que a descida começa, some ao emergir
    var showHud = y > vh * 0.35 && progress < 0.93;
    hud.style.opacity = showHud ? '1' : '0';
    var depth = Math.round(progress * MAX_DEPTH);
    hudValue.textContent = '−' + depth + 'm';
    hudFill.style.height = (progress * 100).toFixed(1) + '%';
  }

  function loop() {
    state.lastFrame = Date.now();
    state.target = window.scrollY || window.pageYOffset || 0;
    var ease = reduced ? 1 : 0.09;
    state.current += (state.target - state.current) * ease;
    if (Math.abs(state.target - state.current) < 0.4) state.current = state.target;
    render();
    if (state.current !== state.target) {
      state.raf = requestAnimationFrame(loop);
    } else {
      state.raf = null;
    }
  }

  function kick() {
    if (!state.ready) return;
    // rAF pode estar pausado (aba em segundo plano etc.): renderiza direto
    if (state.lastFrame && Date.now() - state.lastFrame > 400 && state.raf) {
      cancelAnimationFrame(state.raf);
      state.raf = null;
    }
    if (!state.raf) {
      state.lastFrame = Date.now();
      state.raf = requestAnimationFrame(loop);
      setTimeout(function () {
        if (Date.now() - state.lastFrame > 300) {
          state.current = state.target = window.scrollY || 0;
          render();
        }
      }, 350);
    }
  }

  window.addEventListener('scroll', kick, { passive: true });
  window.addEventListener('resize', kick);

  // Watchdog: se rAF/timeout estiverem pausados (aba em segundo plano),
  // mantém o render coerente com a posição real do scroll.
  setInterval(function () {
    if (!state.ready) return;
    var y = window.scrollY || 0;
    if (!state.raf && Math.abs(state.current - y) > 1) {
      state.current = state.target = y;
      render();
    } else if (state.raf && state.lastFrame && Date.now() - state.lastFrame > 600) {
      state.current = state.target = y;
      render();
    }
  }, 500);

  var wait = setInterval(function () {
    if (!document.querySelector('[data-screen-label]')) return;
    if (!document.body) return;
    clearInterval(wait);
    build();
    state.ready = true;
    state.current = state.target = window.scrollY || 0;
    render();
  }, 400);
})();
  </script>
